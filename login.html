<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartPortal MCA Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 3rem; text-align: center;">
        <div class="logo" style="margin-bottom: 2rem; font-size: 2rem;">SmartPortal</div>
        <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Login to your SmartPortal Account</p>

        <form id="loginForm">
            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Email
                    Address</label>
                <input type="email" placeholder="student@example.edu" required
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none;">
            </div>
            <div style="text-align: left; margin-bottom: 2rem;">
                <label
                    style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                <input type="password" placeholder="••••••••" required
                    style="width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Sign In</button>
        </form>

        <p style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html" style="color: var(--primary);">Register Now</a>
        </p>
    </div>

    <div id="toast" class="toast">Login Successful!</div>

    <script>
        // Check for success message from signup
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('success')) {
            const toast = document.getElementById('toast');
            toast.textContent = 'Account Created! Please Login.';
            toast.style.display = 'block';
            toast.style.background = 'var(--accent)';
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const emailInput = document.querySelector('input[type="email"]').value;
            const users = JSON.parse(localStorage.getItem('portalUsers') || '[]');
            const user = users.find(u => u.email === emailInput);

            if (user) {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('currentUser', user.name);
                sessionStorage.setItem('currentUserRole', user.role);

                if (user.role === 'recruiter') {
                    window.location.href = 'recruiter-dashboard.html';
                } else {
                    window.location.href = 'profile.html';
                }
            } else {
                const toast = document.getElementById('toast');
                toast.textContent = 'User not found. Please register first.';
                toast.style.display = 'block';
                toast.style.background = '#ef4444';
                setTimeout(() => toast.style.display = 'none', 4000);
            }
        });
    </script>
</body>

</html>
